services:
  task-sync:
    build:
      context: .
      dockerfile: Dockerfile
    image: task-sync:latest
    # No `init: true` here: the image already runs tini as PID 1 (see the
    # Dockerfile ENTRYPOINT). Adding Docker's own init would demote the image's
    # tini to a child process, which logs a "Tini is not running as PID 1"
    # warning and disables zombie reaping.
    restart: unless-stopped

    # Liveness probe against the in-container health endpoint (GET /healthz on
    # the loopback default). Uses `node` rather than curl/wget so it works on the
    # slim runtime image regardless of which CLI tools are installed. This mirrors
    # the Dockerfile HEALTHCHECK; defining it here lets Compose surface container
    # health (e.g. `docker compose ps`) and gate dependents via `depends_on`.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

    # Optionally load a local .env file containing secrets. Do not commit it.
    # env_file:
    #   - .env

    environment:
      # Core paths inside the container. These match the image defaults.
      TASK_SYNC_VAULT_PATH: /vault
      TASK_SYNC_STATE_PATH: /data/state.json
      TASK_SYNC_LOG_LEVEL: ${TASK_SYNC_LOG_LEVEL:-info}

      # Defined tags (comma-separated, leading '#' optional) that mark a
      # checklist block as synced tasks. A defined tag on the line above a
      # checklist routes those items to a list named after the tag path
      # (e.g. #todo/groceries → list "todo/groceries"). Default: todo.
      TASK_SYNC_TODO_TAGS: ${TASK_SYNC_TODO_TAGS:-todo}

      # Required when Microsoft To Do is enabled. Provide a 32-byte base64 or hex AES key.
      TASK_SYNC_TOKEN_KEY: ${TASK_SYNC_TOKEN_KEY:-}

      # Microsoft To Do backend. Set MS_ENABLED=true and provide MS_CLIENT_ID to enable.
      MS_ENABLED: ${MS_ENABLED:-false}
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_AUTHORITY: ${MS_AUTHORITY:-https://login.microsoftonline.com/common}
      MS_SCOPES: ${MS_SCOPES:-Tasks.ReadWrite,offline_access,User.Read}
      MS_TOKEN_CACHE_PATH: /data/msal-cache.enc

      # Supernote backend. Point this at a running supernote-task-service
      # instance and supply its API key (via env / Docker secret).
      SUPERNOTE_ENABLED: ${SUPERNOTE_ENABLED:-false}
      SUPERNOTE_SERVICE_URL: ${SUPERNOTE_SERVICE_URL:-https://tasks.example.com}
      SUPERNOTE_API_KEY: ${SUPERNOTE_API_KEY:-}
      SUPERNOTE_REQUEST_TIMEOUT_MS: ${SUPERNOTE_REQUEST_TIMEOUT_MS:-15000}
      # Optional per-backend tag-path → list-name rename map (JSON),
      # e.g. {"todo":"Work","todo/groceries":"Shopping"}.
      SUPERNOTE_TAG_LIST_MAP: ${SUPERNOTE_TAG_LIST_MAP:-}

    # The container runs as UID:GID 1000:1000 (the image's `node` user) by
    # default. If your host vault is owned by a different user, writes fail with
    # "EACCES: permission denied". Pick ONE of:
    #   (a) make the vault writable by 1000:    sudo chown -R 1000:1000 ./vault
    #   (b) run as your own user so vault files stay owned by you — uncomment the
    #       `user:` line below, set PUID/PGID in .env (to `id -u` and `id -g`),
    #       and switch /data to the bind mount shown below (the default named
    #       volume is owned by 1000 and a custom user can't write it).
    # user: "${PUID:-1000}:${PGID:-1000}"

    volumes:
      # Replace ./vault with your Obsidian vault path. The service reads and writes tasks.
      - ./vault:/vault
      # Persistent state.json and encrypted MSAL token cache.
      - task-sync-data:/data
      # When overriding `user:` above, use a host directory you own instead of
      # the named volume so the service can persist state (create it first with
      # `mkdir -p ./data`):
      # - ./data:/data

    # The Dockerfile HEALTHCHECK probes GET /healthz on 127.0.0.1:8080 *inside*
    # the container, which works with the secure loopback default.
    #
    # To expose health/readiness to the HOST, the service must bind to 0.0.0.0.
    # The health host is only configurable via a mounted config file (set
    # health.host = "0.0.0.0"); then uncomment the ports mapping below.
    # ports:
    #   - "127.0.0.1:8080:8080"

volumes:
  task-sync-data:
