name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver, without leading 'v'), e.g. 1.2.3"
        required: true
        type: string

# Only one release may run at a time.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # commit the version bump and push the tag
  packages: write # push the image to GHCR

env:
  IMAGE: ghcr.io/${{ github.repository }} # ghcr.io/adrianba/task-sync

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate version input
        run: |
          VERSION="${{ inputs.version }}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::'$VERSION' is not a valid semver version (expected e.g. 1.2.3)."
            exit 1
          fi
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists."
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Bump version in package.json
        run: npm version "$VERSION" --no-git-tag-version

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): v$VERSION"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin HEAD:main
          git push origin "v$VERSION"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=task-sync
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Summary
        run: |
          {
            echo "### Released v$VERSION"
            echo ""
            echo "- Image: \`$IMAGE:$VERSION\` and \`$IMAGE:latest\`"
            echo "- Tag: \`v$VERSION\` pushed to \`main\`"
          } >> "$GITHUB_STEP_SUMMARY"
